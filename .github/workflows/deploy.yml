name: Deploy

# Triggered after CI succeeds on the main branch.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows]
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}

    defaults:
      run:
        shell: powershell

    steps:
      - name: Sync prod working tree
        # The prod working tree lives at the canonical path; the runner
        # workspace is somewhere else. We fetch + reset --hard so the prod
        # tree mirrors origin/main exactly (no stash, no merge surprises).
        #
        # The runner runs as SYSTEM but the prod tree is owned by a regular
        # user, which trips git's "dubious ownership" guard. We mark the
        # path as safe in SYSTEM's global git config; this is idempotent so
        # repeating it every run is fine.
        run: |
          $RepoDir = "D:\Documents\Dev\srv\PhD-Study-Lab"
          git config --global --add safe.directory "D:/Documents/Dev/srv/PhD-Study-Lab"
          Set-Location $RepoDir
          git fetch origin main
          git reset --hard origin/main
          git rev-parse --short HEAD

      - name: Install backend deps (if changed)
        run: |
          Set-Location D:\Documents\Dev\srv\PhD-Study-Lab\backend
          & "C:\Users\barre\miniforge3\envs\dev\python.exe" -m pip install -r requirements.txt

      - name: Build frontend
        run: |
          Set-Location D:\Documents\Dev\srv\PhD-Study-Lab\frontend
          & "C:\Program Files\nodejs\npm.cmd" ci
          & "C:\Program Files\nodejs\npm.cmd" run build

      - name: Sync ops scripts and restart services
        # The runner needs to run as SYSTEM (or an account in the
        # Administrators group) for Stop/Start-ScheduledTask to work and for
        # the Caddyfile copy to overwrite C:\srv\caddy\.
        #
        # Each block runs even if the previous one fails so we surface the
        # actual problem in the log instead of bailing on the first hiccup;
        # the smoke-test step downstream is the real source of truth.
        run: |
          $ErrorActionPreference = "Continue"
          $Repo = "D:\Documents\Dev\srv\PhD-Study-Lab"

          function Run-Step($Name, [scriptblock]$Block) {
              Write-Host "::group::$Name"
              try { & $Block } catch { Write-Host "[$Name] FAILED: $_" }
              Write-Host "::endgroup::"
          }

          Run-Step "Copy Caddyfile" { Copy-Item "$Repo\deploy\Caddyfile" "C:\srv\caddy\Caddyfile" -Force; Write-Host "OK" }
          Run-Step "Copy start-backend.ps1" { Copy-Item "$Repo\deploy\start-backend.ps1" "C:\srv\backend\start-backend.ps1" -Force; Write-Host "OK" }
          Run-Step "Copy update-cloudflare.ps1" { Copy-Item "$Repo\deploy\update-cloudflare.ps1" "C:\srv\ddns\update-cloudflare.ps1" -Force; Write-Host "OK" }

          Run-Step "Restart backend task" {
              Stop-ScheduledTask  -TaskName "NineLives-Backend" -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 3
              Start-ScheduledTask -TaskName "NineLives-Backend"
              Start-Sleep -Seconds 2
              Get-ScheduledTask -TaskName "NineLives-Backend" | Select-Object TaskName, State | Format-Table -AutoSize | Out-String | Write-Host
          }

          Run-Step "Reload Caddy" {
              # Try a hot reload first; fall back to a task restart if it fails
              & "C:\srv\caddy\caddy.exe" reload --config "C:\srv\caddy\Caddyfile" 2>&1 | Write-Host
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "caddy reload failed (exit $LASTEXITCODE), falling back to task restart"
                  Stop-ScheduledTask  -TaskName "NineLives-Caddy" -ErrorAction SilentlyContinue
                  Start-Sleep -Seconds 2
                  Start-ScheduledTask -TaskName "NineLives-Caddy"
                  Start-Sleep -Seconds 3
                  Get-ScheduledTask -TaskName "NineLives-Caddy" | Select-Object TaskName, State | Format-Table -AutoSize | Out-String | Write-Host
              } else {
                  Write-Host "Caddy reloaded OK"
              }
          }

          # Force a clean exit so the wrapper's `if (!$?)` check doesn't see
          # a stale failure flag from one of the catch blocks above.
          exit 0

      - name: Smoke test
        run: |
          Start-Sleep -Seconds 5
          $r = Invoke-RestMethod https://ninelives.foussistan.fr/api/health -TimeoutSec 15
          if ($r.status -ne "ok") { throw "Health check failed: $($r | ConvertTo-Json -Compress)" }
          Write-Host "Deploy OK: $($r | ConvertTo-Json -Compress)"
