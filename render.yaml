databases:
  - name: phdstudylab-db
    databaseName: phdstudylab
    user: phdstudylab
    plan: free

services:
  - type: web
    name: phdstudylab-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: phdstudylab-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false   # set this manually in the Render dashboard after frontend is deployed

  - type: web
    name: phdstudylab-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # set this to the backend service URL after deploying it
