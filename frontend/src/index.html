<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhD Study Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card-bg:#1a1d27;--text:#e8e9ed;--text-dim:#6b7084;--border:#2a2d3a;--accent:#6366f1;--success:#10b981;--danger:#ef4444;--warning:#f59e0b}
.light{--bg:#f5f5f0;--card-bg:#ffffff;--text:#1a1a2e;--text-dim:#8e8ea0;--border:#e0dfd8;--accent:#4f46e5;--success:#059669;--danger:#dc2626;--warning:#d97706}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC','PingFang SC',-apple-system,sans-serif;min-height:100vh;padding:24px 16px;transition:background .3s,color .3s}
.container{max-width:750px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.header h1{font-size:26px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{margin-top:4px;font-size:13px;color:var(--text-dim)}
.header-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--card-bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.icon-btn:hover{border-color:var(--accent)}
.dropdown{position:relative}
.dropdown-menu{display:none;position:absolute;right:0;top:48px;z-index:100;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:6px;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.dropdown-menu.open{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:none;background:none;width:100%;cursor:pointer;font-family:inherit;font-size:14px;color:var(--text);transition:background .15s}
.dropdown-item:hover{background:var(--border)}
.tabs{display:flex;gap:4px;margin-bottom:28px;background:var(--card-bg);border-radius:14px;padding:4px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:10px 4px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--text-dim);font-family:inherit;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-btn .icon{font-size:15px}.tab-btn .label{font-size:11px}
.card{background:var(--card-bg);border-radius:16px;padding:24px;border:1px solid var(--border)}
.section{display:none;flex-direction:column;gap:24px}.section.active{display:flex}
.btn{padding:10px 24px;border-radius:20px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s}
.btn-accent{background:var(--accent);color:#fff}.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:14px}
input,textarea{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;width:100%;transition:border-color .2s}
textarea{min-height:80px;resize:vertical;line-height:1.7}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
.small-label{font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.history-title{font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin-bottom:12px;font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:620px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);position:relative;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all .2s}
.modal-close:hover{border-color:var(--danger);color:var(--danger)}
.modal h2{font-size:20px;margin-bottom:20px;padding-right:40px}
.modal-section{margin-bottom:18px}
.modal-section-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.modal-section-content{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:18px;border-top:1px solid var(--border)}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--success);color:#fff;padding:12px 28px;border-radius:14px;font-size:14px;font-weight:600;z-index:2000;opacity:0;transition:all .35s ease;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Pomodoro */
.pomo-center{display:flex;flex-direction:column;align-items:center;gap:28px}
.pomo-modes{display:flex;gap:8px}
.pomo-mode-btn{padding:8px 20px;border-radius:20px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;background:var(--card-bg);color:var(--text-dim);transition:all .25s}
.pomo-mode-btn.active{background:var(--accent);color:#fff}
.pomo-ring{position:relative;width:260px;height:260px}
.pomo-ring svg{width:260px;height:260px}
.pomo-ring .track{fill:none;stroke:var(--card-bg);stroke-width:6}
.pomo-ring .progress{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .4s ease}
.pomo-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pomo-time{font-family:'JetBrains Mono','Fira Code',monospace;font-size:56px;font-weight:700;color:var(--text);letter-spacing:4px}
.pomo-label{font-size:13px;color:var(--text-dim);margin-top:4px}
.pomo-actions{display:flex;gap:12px}
.pomo-start{padding:12px 36px;border-radius:28px;border:none;color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .25s}
.pomo-reset{padding:12px 24px;border-radius:28px;border:2px solid var(--border);background:transparent;color:var(--text-dim);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer}
.pomo-stats{display:flex;gap:6px;padding:12px 20px;background:var(--card-bg);border-radius:12px;font-size:14px;flex-wrap:wrap;justify-content:center}
/* Feynman */
.steps-bar{display:flex;align-items:center}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;transition:all .3s;background:var(--card-bg);color:var(--text-dim)}
.step-circle.active{background:var(--accent);color:#fff}
.step-line{flex:1;height:2px;background:var(--border);transition:background .3s}.step-line.active{background:var(--accent)}
.feynman-card{padding:28px}.feynman-card h3{color:var(--accent);font-size:18px;margin-bottom:6px}
.feynman-card p{color:var(--text-dim);font-size:14px;margin-bottom:16px}
.feynman-card textarea{min-height:140px;padding:16px;border-radius:12px}
.feynman-nav{display:flex;justify-content:space-between;margin-top:16px}
.fh-item{padding:14px 18px;border-radius:12px;background:var(--card-bg);border:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s}
.fh-item:hover{border-color:var(--accent);transform:translateX(4px)}
/* Notes */
.notes-form{display:flex;flex-direction:column;gap:14px}
.notes-row{display:grid;grid-template-columns:1fr 1fr auto;gap:14px}
@media(max-width:560px){.notes-row{grid-template-columns:1fr}}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.note-card{background:var(--card-bg);border-radius:14px;padding:20px;border:1px solid var(--border);display:flex;flex-direction:column;gap:10px;transition:transform .15s;cursor:pointer}
.note-card:hover{transform:translateY(-2px)}
.note-card-header{display:flex;justify-content:space-between;align-items:flex-start}
.note-card-header h4{font-size:15px;line-height:1.4;flex:1}
.note-card-actions{display:flex;gap:6px;flex-shrink:0;margin-left:8px}
.note-card-actions button{background:none;border:none;cursor:pointer;font-size:14px;padding:2px}
.note-meta{font-size:12px;color:var(--text-dim)}
.note-excerpt{font-size:13px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.empty-state{text-align:center;padding:40px;color:var(--text-dim)}
.empty-state .emoji{font-size:40px;margin-bottom:12px}
/* Tracker */
.progress-bar-wrap{height:10px;border-radius:5px;background:var(--border);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:5px;transition:width .4s ease}
.task-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;background:var(--card-bg);border:1px solid var(--border)}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:all .2s;flex-shrink:0;background:transparent}
.checkbox.checked{border-color:var(--success);background:var(--success)}
.task-text{flex:1;font-size:14px;transition:all .2s}.task-text.done{text-decoration:line-through;opacity:.5}
.task-remove{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:16px;padding:4px;opacity:.5}
.mood-row{display:flex;gap:12px;justify-content:center}
.mood-btn{width:52px;height:52px;border-radius:14px;border:2px solid var(--border);background:transparent;font-size:26px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.mood-btn.active{border-color:var(--accent);transform:scale(1.15)}
.log-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:12px;background:var(--card-bg);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.log-item:hover{border-color:var(--accent);transform:translateX(4px)}
/* Stats */
.stat-card{background:var(--card-bg);border-radius:16px;padding:20px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;overflow:hidden}
.stat-card .delta{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;margin-top:2px}
.delta-up{background:#10b98120;color:var(--success)}.delta-down{background:#ef444420;color:var(--danger)}.delta-flat{background:var(--border);color:var(--text-dim)}
.stat-number{font-size:30px;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;text-align:center}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.sparkline{display:flex;align-items:flex-end;gap:2px;height:32px;margin-top:4px}
.spark-bar{flex:1;border-radius:2px;min-height:2px;transition:height .3s}
.heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,16px);gap:3px}
.heat-cell{width:16px;height:16px;border-radius:3px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.heat-cell:hover{transform:scale(1.4);box-shadow:0 0 8px rgba(99,102,241,.4);z-index:1}
.hour-chart{display:flex;align-items:flex-end;gap:3px;height:100px}
.hour-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
.hour-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .4s}
.hour-label{font-size:9px;color:var(--text-dim)}
.hour-val{font-size:9px;font-weight:700;color:var(--text)}
.insight-row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.insight-row:last-child{border-bottom:none}
.insight-key{color:var(--text-dim)}
.insight-val{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:14px}
.weekly-row{display:grid;grid-template-columns:60px 1fr 50px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.weekly-row:last-child{border-bottom:none}
.mini-bar-bg{height:8px;border-radius:4px;background:var(--border);overflow:hidden}
.mini-bar-fill{height:100%;border-radius:4px;transition:width .4s}
/* Mood stats */
.mood-dist-row{display:flex;align-items:center;gap:12px;padding:8px 0}
.mood-dist-emoji{font-size:24px;width:36px;text-align:center;flex-shrink:0}
.mood-dist-bar{flex:1;height:10px;border-radius:5px;background:var(--border);overflow:hidden}
.mood-dist-fill{height:100%;border-radius:5px;transition:width .5s}
.mood-dist-info{font-size:12px;color:var(--text-dim);min-width:80px;text-align:right;flex-shrink:0}
.mood-dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:transform .15s;flex-shrink:0}
.mood-dot:hover{transform:scale(1.3)}
.mood-corr-row{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:10px;background:var(--bg);margin-bottom:8px;font-size:13px}
.mood-corr-emoji{font-size:20px}
.mood-corr-data{flex:1;display:flex;flex-direction:column;gap:3px}
.mood-corr-label{font-size:11px;color:var(--text-dim)}
.footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim)}
#importInput{display:none}
/* Confetti */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3000;overflow:hidden}
.confetti-piece{position:absolute;width:8px;height:8px;top:-10px;border-radius:2px;animation:confettiFall 2.5s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(0.3);opacity:0}}
/* Achievement popup */
.achieve-overlay{position:fixed;inset:0;z-index:2500;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.achieve-card{background:var(--card-bg);border:1px solid var(--border);border-radius:24px;padding:36px 32px;text-align:center;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:achievePop .4s cubic-bezier(.17,.67,.35,1.4)}
@keyframes achievePop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.achieve-num{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:800;margin:12px 0 4px}
.achieve-label{font-size:14px;color:var(--text-dim);margin-bottom:16px}
.achieve-sub{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:20px}
/* Level & XP */
.xp-bar-bg{height:12px;border-radius:6px;background:var(--border);overflow:hidden;margin:12px 0 8px}
.xp-bar-fill{height:100%;border-radius:6px;transition:width .8s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),#a78bfa)}
.level-title{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.level-num{font-family:'JetBrains Mono',monospace;font-size:56px;font-weight:800;line-height:1;margin:8px 0}
/* Milestones */
.milestone-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)}
.milestone-row:last-child{border-bottom:none}
.ms-check{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:700}
.ms-check.done{background:var(--success);color:#fff}
.ms-check.pending{background:var(--border);color:var(--text-dim)}
.ms-info{flex:1}
.ms-name{font-size:14px;font-weight:600}
.ms-desc{font-size:12px;color:var(--text-dim);margin-top:2px}
.ms-progress{width:60px;text-align:right;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
/* Records */
.record-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.record-row:last-child{border-bottom:none}
.record-val{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--accent)}
/* Focus session list in modal */
.focus-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:var(--bg);margin-bottom:6px;font-size:13px}
.task-done-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.task-done-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* === NEW: Gamification — Currency, Combo, Quests, Loot === */
/* Top status bar with coins & freezes */
.top-status{display:flex;gap:6px;align-items:center;margin-right:4px}
.status-pill{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:10px;background:var(--card-bg);border:1px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.status-pill:hover{border-color:var(--accent);transform:translateY(-1px)}
.status-pill .ico{font-size:14px}
.coin-pill{color:#f59e0b}
.gem-pill{color:#8b5cf6}
.freeze-pill{color:#38bdf8}
/* Combo display above pomodoro */
.combo-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:12px;background:linear-gradient(90deg,var(--card-bg),var(--card-bg));border:1px solid var(--border);font-size:13px;min-width:240px;justify-content:center}
.combo-bar.hot{border-color:#f59e0b;background:linear-gradient(90deg,#f59e0b15,#ef444415);animation:comboPulse 2s ease-in-out infinite}
@keyframes comboPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 8px rgba(245,158,11,0)}}
.combo-flame{font-size:20px;filter:drop-shadow(0 0 4px #f59e0b80)}
.combo-count{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:16px;color:#f59e0b}
.combo-mult{font-size:11px;padding:2px 8px;border-radius:8px;background:#f59e0b;color:#fff;font-weight:700}
/* Daily quests card */
.quest-card{background:linear-gradient(135deg,var(--card-bg),var(--card-bg));border-radius:16px;padding:20px;border:1px solid var(--border)}
.quest-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.quest-header h3{font-size:15px;display:flex;align-items:center;gap:8px}
.quest-reset{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.quest-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:var(--bg);border:1px solid var(--border);margin-bottom:8px;transition:all .25s}
.quest-item.done{border-color:var(--success);background:linear-gradient(90deg,#10b98115,var(--bg))}
.quest-item.claimable{border-color:var(--warning);background:linear-gradient(90deg,#f59e0b20,var(--bg));animation:claimPulse 1.5s ease-in-out infinite}
@keyframes claimPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.5)}50%{box-shadow:0 0 0 6px rgba(245,158,11,0)}}
.quest-icon{font-size:22px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--card-bg);flex-shrink:0}
.quest-info{flex:1;min-width:0}
.quest-name{font-size:13px;font-weight:600;margin-bottom:4px}
.quest-prog-bar{height:5px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:4px}
.quest-prog-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}
.quest-reward{text-align:right;font-size:11px;color:var(--text-dim);font-weight:600;white-space:nowrap;flex-shrink:0}
.quest-reward .rv{font-family:'JetBrains Mono',monospace;font-size:13px;color:#f59e0b;font-weight:700}
.quest-claim-btn{padding:6px 12px;border-radius:10px;border:none;background:var(--warning);color:#fff;font-size:12px;font-weight:700;cursor:pointer;animation:claimPulse 1.5s infinite}
/* Loot chest animation */
.loot-overlay{position:fixed;inset:0;z-index:3500;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s}
.chest-wrap{position:relative;width:180px;height:180px;cursor:pointer;animation:chestBob 1.2s ease-in-out infinite}
@keyframes chestBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.chest-emoji{font-size:140px;filter:drop-shadow(0 0 30px rgba(245,158,11,.7))}
.chest-wrap.opening{animation:chestShake .3s infinite}
@keyframes chestShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px) rotate(-2deg)}75%{transform:translateX(4px) rotate(2deg)}}
.chest-hint{color:#fff;margin-top:20px;font-size:14px;opacity:.8}
.loot-rays{position:absolute;inset:-60px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.5),transparent 60%);animation:rayPulse 2s ease-in-out infinite;z-index:-1}
@keyframes rayPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
.loot-reveal{background:var(--card-bg);border:2px solid var(--accent);border-radius:24px;padding:32px;text-align:center;max-width:360px;animation:revealPop .5s cubic-bezier(.17,.67,.35,1.6)}
@keyframes revealPop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.loot-rarity{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:10px;display:inline-block;margin-bottom:12px}
.rar-common{background:#6b708440;color:#9ca3af}
.rar-uncommon{background:#10b98130;color:#10b981}
.rar-rare{background:#3b82f630;color:#60a5fa}
.rar-epic{background:#8b5cf630;color:#a78bfa;box-shadow:0 0 16px #8b5cf630}
.rar-legendary{background:linear-gradient(90deg,#f59e0b40,#ef444440);color:#fbbf24;box-shadow:0 0 24px #f59e0b50;animation:legendGlow 1.5s ease-in-out infinite}
@keyframes legendGlow{0%,100%{box-shadow:0 0 24px #f59e0b50}50%{box-shadow:0 0 40px #f59e0b80}}
.loot-big-emoji{font-size:80px;margin:10px 0}
.loot-name{font-size:20px;font-weight:800;margin-bottom:6px}
.loot-desc{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:16px}
.loot-rewards{display:flex;gap:12px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.loot-reward-chip{padding:8px 14px;border-radius:12px;background:var(--bg);border:1px solid var(--border);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
/* Badge collection */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;margin-top:10px}
.badge-cell{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid var(--border);background:var(--bg);padding:6px;cursor:pointer;transition:all .2s;position:relative}
.badge-cell:hover{transform:scale(1.08);border-color:var(--accent)}
.badge-cell.locked{opacity:.3;filter:grayscale(1)}
.badge-emoji{font-size:28px}
.badge-count{position:absolute;top:2px;right:4px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;font-family:'JetBrains Mono',monospace}
.badge-name{font-size:9px;color:var(--text-dim);margin-top:2px;text-align:center;line-height:1.1}
/* Quick status */
.quick-stats{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.q-stat{flex:1;min-width:90px;padding:10px;border-radius:10px;background:var(--card-bg);border:1px solid var(--border);text-align:center}
.q-stat .v{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:18px}
.q-stat .l{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
/* Motivational banner */
.motiv-banner{padding:14px 18px;border-radius:14px;background:linear-gradient(135deg,#6366f120,#a78bfa20);border:1px solid var(--border);font-size:13px;line-height:1.6;display:flex;align-items:center;gap:12px}
.motiv-banner .mb-ico{font-size:26px;flex-shrink:0}
/* Level up effect */
.levelup-overlay{position:fixed;inset:0;z-index:4000;display:flex;align-items:center;justify-content:center;pointer-events:none}
.levelup-text{font-size:42px;font-weight:800;background:linear-gradient(135deg,#fbbf24,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:levelFly 2.5s ease-out forwards;text-shadow:0 0 40px rgba(245,158,11,.6)}
@keyframes levelFly{0%{opacity:0;transform:scale(.3) translateY(50px)}20%{opacity:1;transform:scale(1.2) translateY(0)}40%{transform:scale(1) translateY(-10px)}80%{opacity:1;transform:scale(1) translateY(-10px)}100%{opacity:0;transform:scale(.9) translateY(-80px)}}
/* Shop */
.shop-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:var(--bg);border:1px solid var(--border);margin-bottom:8px}
.shop-ico{font-size:28px;width:48px;text-align:center;flex-shrink:0}
.shop-body{flex:1;min-width:0}
.shop-name{font-size:14px;font-weight:700}
.shop-desc{font-size:12px;color:var(--text-dim);margin-top:2px;line-height:1.5}
.shop-buy{padding:8px 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.shop-buy:disabled{opacity:.4;cursor:not-allowed}
/* Rewards pop */
.reward-pop{position:fixed;right:24px;top:80px;z-index:2800;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.reward-toast{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;box-shadow:0 8px 20px rgba(0,0,0,.3);animation:rewardSlide 3s ease forwards;display:flex;align-items:center;gap:8px}
@keyframes rewardSlide{0%{opacity:0;transform:translateX(80px)}15%{opacity:1;transform:translateX(0)}75%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(80px)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div style="display:flex;align-items:center;gap:12px"><h1>PhD Study Lab</h1><div id="streakBadge" style="display:none;padding:4px 12px;border-radius:10px;background:var(--warning);color:#fff;font-size:12px;font-weight:700;white-space:nowrap"></div></div>
      <p data-i18n="header.subtitle">博士生学习助手</p>
    </div>
    <div class="header-actions">
      <div class="top-status">
        <div class="status-pill coin-pill" id="coinPill" onclick="openShop()" data-i18n-title="status.coin"><span class="ico">🪙</span><span id="coinCount">0</span></div>
        <div class="status-pill freeze-pill" id="freezePill" onclick="showFreezeInfo()" data-i18n-title="status.freeze"><span class="ico">🛡️</span><span id="freezeCount">0</span></div>
      </div>
      <div class="dropdown">
        <button class="icon-btn" onclick="toggleDropdown()" data-i18n-title="data.manage">💾</button>
        <div class="dropdown-menu" id="dataDropdown">
          <button class="dropdown-item" onclick="exportData()"><span style="width:22px;text-align:center">📤</span> <span data-i18n="data.export">导出数据</span></button>
          <button class="dropdown-item" onclick="document.getElementById('importInput').click()"><span style="width:22px;text-align:center">📥</span> <span data-i18n="data.import">导入数据</span></button>
          <button class="dropdown-item" onclick="clearAllData()" style="color:var(--danger)"><span style="width:22px;text-align:center">🗑</span> <span data-i18n="data.clear">清空所有数据</span></button>
        </div>
      </div>
      <input type="file" id="importInput" accept=".json" onchange="importData(event)">
      <div class="dropdown">
        <button class="icon-btn" onclick="toggleLangDropdown()" title="Language / 语言 / Langue">🌐</button>
        <div class="dropdown-menu" id="langDropdown">
          <button class="dropdown-item" onclick="setLang('zh')"><span style="width:22px;text-align:center">🇨🇳</span> 中文</button>
          <button class="dropdown-item" onclick="setLang('en')"><span style="width:22px;text-align:center">🇬🇧</span> English</button>
          <button class="dropdown-item" onclick="setLang('fr')"><span style="width:22px;text-align:center">🇫🇷</span> Français</button>
        </div>
      </div>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="pomodoro" onclick="switchTab('pomodoro')"><span class="icon">⏱</span><span class="label" data-i18n="tab.pomodoro">专注</span></button>
    <button class="tab-btn" data-tab="feynman" onclick="switchTab('feynman')"><span class="icon">🧠</span><span class="label" data-i18n="tab.feynman">费曼</span></button>
    <button class="tab-btn" data-tab="notes" onclick="switchTab('notes')"><span class="icon">📑</span><span class="label" data-i18n="tab.notes">文献</span></button>
    <button class="tab-btn" data-tab="tracker" onclick="switchTab('tracker')"><span class="icon">📋</span><span class="label" data-i18n="tab.tracker">每日</span></button>
    <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')"><span class="icon">📊</span><span class="label" data-i18n="tab.stats">统计</span></button>
  </div>

  <!-- ══ Pomodoro ══ -->
  <div id="sec-pomodoro" class="section active">
    <div id="motivBanner"></div>
    <div id="dailyQuestsCard"></div>
    <div class="pomo-center">
      <div id="comboBar" class="combo-bar" style="display:none"></div>
      <div class="pomo-modes">
        <button class="pomo-mode-btn active" data-mode="focus" onclick="pomoSwitchMode('focus')" data-i18n="pomo.mode.focus">专注时间</button>
        <button class="pomo-mode-btn" data-mode="short" onclick="pomoSwitchMode('short')" data-i18n="pomo.mode.short">短休息</button>
        <button class="pomo-mode-btn" data-mode="long" onclick="pomoSwitchMode('long')" data-i18n="pomo.mode.long">长休息</button>
      </div>
      <div class="pomo-ring">
        <svg viewBox="0 0 260 260"><circle class="track" cx="130" cy="130" r="120"/><circle class="progress" id="pomoArc" cx="130" cy="130" r="120" stroke-dasharray="753.98" stroke-dashoffset="753.98" transform="rotate(-90 130 130)"/></svg>
        <div class="pomo-display"><span class="pomo-time" id="pomoTime">25:00</span><span class="pomo-label" id="pomoLabel" data-i18n="pomo.mode.focus">专注时间</span></div>
      </div>
      <div class="pomo-actions">
        <button class="pomo-start" id="pomoStartBtn" onclick="pomoToggle()" style="background:var(--accent);box-shadow:0 4px 20px rgba(99,102,241,.3)" data-i18n="pomo.start">开始</button>
        <button class="pomo-reset" onclick="pomoReset()" data-i18n="pomo.reset">重置</button>
      </div>
      <div class="pomo-stats">
        <span style="color:var(--text-dim)" data-i18n="pomo.today">今日专注：</span>
        <span style="color:var(--accent);font-weight:700" id="pomoSessions">0 次</span>
        <span style="color:var(--text-dim);margin-left:8px" id="pomoMins">共 0 分钟</span>
      </div>
      <div id="pomoTodayList"></div>
    </div>
  </div>

  <!-- ══ Feynman ══ -->
  <div id="sec-feynman" class="section">
    <div class="steps-bar" id="feynmanSteps"></div>
    <div class="card feynman-card">
      <h3 id="feynmanTitle"></h3><p id="feynmanDesc"></p>
      <textarea id="feynmanInput" data-i18n-placeholder="feyn.placeholder" placeholder="在这里写下你的思考..."></textarea>
      <div class="feynman-nav">
        <button class="btn btn-outline" id="feynmanPrev" onclick="feynmanPrev()" data-i18n="feyn.prev">上一步</button>
        <button class="btn btn-accent" id="feynmanNext" onclick="feynmanNext()" data-i18n="feyn.next">下一步</button>
      </div>
    </div>
    <div id="feynmanHistory"></div>
  </div>

  <!-- ══ Notes ══ -->
  <div id="sec-notes" class="section">
    <div class="card notes-form">
      <div class="notes-row">
        <div><div class="small-label" style="margin-bottom:6px" data-i18n="note.title">论文标题</div><input id="noteTitle" data-i18n-placeholder="note.title.ph" placeholder="输入论文标题..."></div>
        <div><div class="small-label" style="margin-bottom:6px" data-i18n="note.authors">作者</div><input id="noteAuthors" data-i18n-placeholder="note.authors.ph" placeholder="输入作者..."></div>
        <div><div class="small-label" style="margin-bottom:6px" data-i18n="note.year">年份</div><input id="noteYear" data-i18n-placeholder="note.year.ph" placeholder="年份" style="width:80px"></div>
      </div>
      <div><div class="small-label" style="margin-bottom:6px" data-i18n="note.key">核心观点 & 方法</div><textarea id="noteKey" data-i18n-placeholder="note.key.ph" placeholder="输入核心观点..."></textarea></div>
      <div><div class="small-label" style="margin-bottom:6px" data-i18n="note.q">问题 & 思考</div><textarea id="noteQ" data-i18n-placeholder="note.q.ph" placeholder="输入问题与思考..."></textarea></div>
      <div><div class="small-label" style="margin-bottom:6px" data-i18n="note.tags">标签（逗号分隔）</div><input id="noteTags" data-i18n-placeholder="note.tags.ph" placeholder="例如：深度学习, NLP, Transformer"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-outline" id="noteCancelBtn" style="display:none" onclick="noteCancel()" data-i18n="btn.cancel">取消</button>
        <button class="btn btn-accent" id="noteSubmitBtn" onclick="noteSave()" data-i18n="note.add">添加笔记</button>
      </div>
    </div>
    <div id="notesContainer"></div>
  </div>

  <!-- ══ Tracker ══ -->
  <div id="sec-tracker" class="section">
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:14px;font-weight:600" data-i18n="tracker.progress">今日进度</span>
        <span style="font-size:14px;font-weight:700;color:var(--accent)" id="trackPct">0%</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="trackBar" style="width:0;background:var(--accent)"></div></div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:8px" id="trackCount">完成 0 / 0 项任务</div>
    </div>
    <div id="taskList"></div>
    <div style="display:flex;gap:8px">
      <input id="newTaskInput" data-i18n-placeholder="tracker.newtask" placeholder="添加今日任务..." onkeydown="if(event.key==='Enter')addTask()">
      <button class="btn btn-accent" onclick="addTask()" style="padding:10px 20px;border-radius:10px;flex-shrink:0" data-i18n="tracker.add">添加</button>
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:16px">
      <span style="font-size:14px;font-weight:600" data-i18n="tracker.mood.q">今天感觉如何？</span>
      <div class="mood-row" id="moodRow"></div>
      <textarea id="reflectionInput" data-i18n-placeholder="tracker.reflect.ph" placeholder="今天的收获和反思..." style="min-height:70px"></textarea>
      <button class="btn btn-success" style="align-self:flex-end" onclick="saveDay()" data-i18n="tracker.save">保存今日记录</button>
    </div>
    <div id="logHistory"></div>
  </div>

  <!-- ══ Stats ══ -->
  <div id="sec-stats" class="section">
    <!-- Level & XP bar -->
    <div class="card" id="levelCard" style="text-align:center;padding:28px 24px"></div>
    <!-- Period selector -->
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-sm btn-outline stat-range active" data-range="7" onclick="setRange(7)" data-i18n="stats.range.7">近7天</button>
      <button class="btn btn-sm btn-outline stat-range" data-range="14" onclick="setRange(14)" data-i18n="stats.range.14">近14天</button>
      <button class="btn btn-sm btn-outline stat-range" data-range="30" onclick="setRange(30)" data-i18n="stats.range.30">近30天</button>
      <button class="btn btn-sm btn-outline stat-range" data-range="0" onclick="setRange(0)" data-i18n="stats.range.all">全部</button>
    </div>
    <!-- KPI cards -->
    <div class="stat-grid" id="statCards"></div>
    <!-- Milestones -->
    <div class="card" id="milestonesCard"></div>
    <!-- Badge collection -->
    <div class="card" id="badgeCollectionCard"></div>
    <!-- Personal records -->
    <div class="card" id="recordsCard"></div>
    <!-- Insights -->
    <div class="card" id="insightsCard" style="display:flex;flex-direction:column;gap:10px"></div>
    <!-- Focus hour distribution -->
    <div class="card"><h3 style="font-size:15px;margin-bottom:4px" data-i18n="stats.hour.title">专注时段分布</h3><p style="font-size:12px;color:var(--text-dim);margin-bottom:14px" data-i18n="stats.hour.desc">你在哪些小时段最专注？</p><div class="hour-chart" id="hourChart"></div></div>
    <!-- Weekly comparison table -->
    <div class="card"><h3 style="font-size:15px;margin-bottom:14px" data-i18n="stats.weekly.title">每周对比</h3><div id="weeklyTable"></div></div>
    <!-- Mood stats -->
    <div class="card"><h3 style="font-size:15px;margin-bottom:4px" data-i18n="stats.mood.title">心情统计</h3><p style="font-size:12px;color:var(--text-dim);margin-bottom:14px" data-i18n="stats.mood.desc">心情分布 + 每日走势</p>
      <div id="moodDistribution" style="margin-bottom:20px"></div>
      <div style="font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px" data-i18n="stats.mood.timeline">每日心情走势</div>
      <div id="moodTimeline" style="display:flex;align-items:center;gap:3px;flex-wrap:wrap"></div>
      <div id="moodCorrelation" style="margin-top:18px"></div>
    </div>
    <!-- Heatmap -->
    <div class="card"><h3 style="font-size:15px;margin-bottom:6px" data-i18n="stats.heat.title">活跃热力图</h3><p style="font-size:12px;color:var(--text-dim);margin-bottom:12px" data-i18n="stats.heat.desc">颜色越深 = 当日活动越多（点击查看详情）</p><div style="display:flex;gap:4px;align-items:center;margin-bottom:10px;font-size:11px;color:var(--text-dim)"><span data-i18n="stats.heat.less">少</span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:var(--border)"></span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#6366f130"></span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#6366f160"></span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#6366f1a0"></span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#6366f1"></span><span data-i18n="stats.heat.more">多</span></div><div class="heatmap-grid" id="heatmap"></div></div>
  </div>

  <div class="footer" data-i18n="footer">专注 · 理解 · 记录 · 坚持</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   🌐 I18N — Internationalization system
   Supports: zh (Chinese), en (English), fr (French)
   ═══════════════════════════════════════════════ */
const I18N={
  zh:{
    'lang.code':'zh-CN',
    'doc.title':'PhD Study Lab — 博士生学习助手',
    'header.subtitle':'博士生学习助手',
    'status.coin':'学术币 · 点击打开商店',
    'status.freeze':'护盾 · 可抵消 1 天中断',
    'data.manage':'数据管理','data.export':'导出数据','data.import':'导入数据','data.clear':'清空所有数据',
    'tab.pomodoro':'专注','tab.feynman':'费曼','tab.notes':'文献','tab.tracker':'每日','tab.stats':'统计',
    // Pomodoro
    'pomo.mode.focus':'专注时间','pomo.mode.short':'短休息','pomo.mode.long':'长休息',
    'pomo.start':'开始','pomo.pause':'暂停','pomo.reset':'重置',
    'pomo.today':'今日专注：','pomo.sessions':'{n} 次','pomo.mins':'共 {n} 分钟',
    'pomo.todayList':'今日专注记录','pomo.session.start':'{t} 开始','pomo.session.dur':'{n} 分钟',
    'pomo.complete':'专注完成','pomo.complete.unit':'分钟（第 {n} 个 · 🪙+{c}{combo}）','pomo.complete.combo':' · 连击×{m}',
    'pomo.msg.0':'','pomo.msg.1':'','pomo.msg.2':'状态不错，继续保持','pomo.msg.3':'进入深度模式了','pomo.msg.4':'效率拉满的一天','pomo.msg.5':'今天太强了','pomo.msg.6':'停不下来了 🔥','pomo.msg.7':'史诗级专注','pomo.msg.8':'传奇状态','pomo.msg.9':'今天你就是神',
    // Feynman
    'feyn.placeholder':'在这里写下你的思考...','feyn.prev':'上一步','feyn.next':'下一步','feyn.done':'完成保存',
    'feyn.step.1.title':'选择概念','feyn.step.1.desc':'写下你想要深入理解的一个概念或理论',
    'feyn.step.2.title':'教给小白','feyn.step.2.desc':'用最简单的语言解释这个概念，就像在教一个完全不懂的人',
    'feyn.step.3.title':'找出漏洞','feyn.step.3.desc':'回顾你的解释，找出含糊不清或无法说明白的地方',

let currentLang=localStorage.getItem('phd_lang')||'zh';
if(!I18N[currentLang])currentLang='zh';

function t(key,vars){
  let s=(I18N[currentLang]&&I18N[currentLang][key])||(I18N.zh[key]||key);
  if(vars){Object.keys(vars).forEach(k=>{s=s.replace(new RegExp('\\{'+k+'\\}','g'),vars[k])})}
  return s;
}
// Like t() but HTML-escapes every interpolated variable — use whenever the
// result is going to be put into innerHTML and the vars may contain user data.
function tE(key,vars){
  let s=(I18N[currentLang]&&I18N[currentLang][key])||(I18N.zh[key]||key);
  if(vars){Object.keys(vars).forEach(k=>{s=s.replace(new RegExp('\\{'+k+'\\}','g'),esc(String(vars[k]==null?'':vars[k])))})}
  return s;
}

function applyI18n(){
  document.documentElement.lang=t('lang.code');

  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'))});

  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{el.setAttribute('placeholder',t(el.getAttribute('data-i18n-placeholder')))});
  // Titles (tooltips)
  document.querySelectorAll('[data-i18n-title]').forEach(el=>{el.setAttribute('title',t(el.getAttribute('data-i18n-title')))});
}

/* ═══════════════════════════════════════════════
   📇 Data Indexes
   Build once per render instead of re-scanning arrays.
   Without these, every streak calc / stats render does
   O(365 × N) work — breaks down with ~1 year of history.
   ═══════════════════════════════════════════════ */
function buildDataIndex(logsArr,focusArr){
  const logByDay={},focusByDay={},focusCountByDay={},focusListByDay={},dateSet=new Set();
  for(let i=0;i<logsArr.length;i++){const l=logsArr[i];logByDay[l.date]=l;dateSet.add(l.date)}
  for(let i=0;i<focusArr.length;i++){
    const s=focusArr[i];
    focusByDay[s.date]=(focusByDay[s.date]||0)+(s.duration||0);
    focusCountByDay[s.date]=(focusCountByDay[s.date]||0)+1;
    (focusListByDay[s.date]=focusListByDay[s.date]||[]).push(s);
    dateSet.add(s.date);
  }
  return {logByDay,focusByDay,focusCountByDay,focusListByDay,dateSet};
}

// Helpers that return localized name/desc for a loot item
function itemName(it){return t('item.'+it.key+'.n')}
function itemDesc(it){return t('item.'+it.key+'.d')}
const RARITY_COLORS={common:'var(--text-dim)',uncommon:'#10b981',rare:'#60a5fa',epic:'#a78bfa',legendary:'#fbbf24'};
function RARITY_LABEL(r){return t('rarity.'+r)}

function rollLoot(pomosDoneToday){
  // 保底机制：第 5 个番茄钟保底 uncommon+，第 20 个保底 rare+
  const r=Math.random()*100;
  let rarity='common';
  if(pomosDoneToday>0&&pomosDoneToday%20===0) rarity=r<25?'legendary':r<65?'epic':'rare';
  else if(pomosDoneToday>0&&pomosDoneToday%10===0) rarity=r<5?'legendary':r<20?'epic':r<60?'rare':'uncommon';
  else if(pomosDoneToday>0&&pomosDoneToday%5===0) rarity=r<2?'epic':r<15?'rare':'uncommon';
  else {
    if(r<0.5)rarity='legendary';
    else if(r<3)rarity='epic';
    else if(r<10)rarity='rare';
    else if(r<30)rarity='uncommon';
    else rarity='common';
  }
  const pool=LOOT_TABLE[rarity];
  const item=pool[Math.floor(Math.random()*pool.length)];
  return {rarity,item};
}

// —— Combo / Streak Within Day ——
// 当日连续完成番茄钟不中断，连击×2、×3 等加成奖励
function updateCombo(onFocusComplete){
  const today=todayStr();
  if(gameState.comboLastDate!==today){gameState.comboCount=0}
  if(onFocusComplete){
    gameState.comboCount++;
    gameState.comboLastDate=today;
  }
  saveGameState();
  renderCombo();
}
function comboMultiplier(){
  const c=gameState.comboCount;
  if(c>=10)return 3;
  if(c>=6)return 2.5;
  if(c>=4)return 2;
  if(c>=2)return 1.5;
  return 1;
}
function renderCombo(){
  const bar=document.getElementById('comboBar');if(!bar)return;
  const c=gameState.comboCount;
  if(c<2){bar.style.display='none';return}
  bar.style.display='';
  bar.classList.toggle('hot',c>=4);
  const mult=comboMultiplier();
  bar.innerHTML=`<span class="combo-flame">🔥</span>
    <span>${t('combo.text')} <span class="combo-count">${c}</span></span>
    <span class="combo-mult">×${mult}</span>
    <span style="font-size:11px;color:var(--text-dim)">${t('combo.hint')}</span>`;
}

// —— Daily Login Reward ——
function tryDailyLogin(){
  const today=todayStr();
  if(gameState.dailyClaimedDate===today)return;
  // 渐进登录奖励：基础 10 币 + 连击日加成
  const streak=calcStreak();
  const baseCoins=10;
  const bonus=Math.min(streak*2,30);
  const total=baseCoins+bonus;

// —— Daily Quests (WoW dailies pattern) ——
// 每天 3 个随机任务，完成后可领奖励；减少完美主义压力，有易有中有挑战
const QUEST_POOL=[
  {id:'pomo1',icon:'⏱',nameKey:'quest.pomo1',target:1,type:'pomo',reward:15,difficulty:'easy'},
  {id:'pomo3',icon:'🎯',nameKey:'quest.pomo3',target:3,type:'pomo',reward:30,difficulty:'med'},
  {id:'pomo5',icon:'🔥',nameKey:'quest.pomo5',target:5,type:'pomo',reward:60,difficulty:'hard'},
  {id:'focus60',icon:'⚡',nameKey:'quest.focus60',target:60,type:'focusMin',reward:35,difficulty:'med'},
  {id:'focus120',icon:'💎',nameKey:'quest.focus120',target:120,type:'focusMin',reward:80,difficulty:'hard'},
  {id:'task1',icon:'✅',nameKey:'quest.task1',target:1,type:'taskDone',reward:12,difficulty:'easy'},
  {id:'task3',icon:'📋',nameKey:'quest.task3',target:3,type:'taskDone',reward:30,difficulty:'med'},
  {id:'note1',icon:'📑',nameKey:'quest.note1',target:1,type:'note',reward:25,difficulty:'med'},
  {id:'feyn1',icon:'🧠',nameKey:'quest.feyn1',target:1,type:'feynman',reward:35,difficulty:'med'},
  {id:'mood',icon:'📝',nameKey:'quest.mood',target:1,type:'logSaved',reward:20,difficulty:'easy'},
  {id:'combo3',icon:'🔗',nameKey:'quest.combo3',target:3,type:'combo',reward:25,difficulty:'med'},
];
function hashDate(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h)}
function getDailyQuests(){
  const today=todayStr();
  let stored=load('dailyQuests',null);
  if(stored&&stored.date===today)return stored;
  // 分难度各抽 1 个（保证每天至少 1 个易任务可达成）
  const easy=QUEST_POOL.filter(q=>q.difficulty==='easy');
  const med=QUEST_POOL.filter(q=>q.difficulty==='med');
  const hard=QUEST_POOL.filter(q=>q.difficulty==='hard');
  const seed=hashDate(today);
  const pick=(arr,i)=>arr[(seed+i)%arr.length];
  const quests=[pick(easy,0),pick(med,1),pick(hard,2)].map(q=>({...q,progress:0,claimed:false}));
  stored={date:today,quests};save('dailyQuests',stored);return stored;
}
function computeQuestProgress(){
  const q=getDailyQuests();
  const today=todayStr();
  const todayPomos=focusSessions.filter(s=>s.date===today).length;
  const todayFocusM=focusSessions.filter(s=>s.date===today).reduce((a,s)=>a+s.duration,0);
  const todayTaskDone=tasks.filter(t=>t.done).length + (logs.find(l=>l.date===today)?.tasks?.filter(t=>t.done).length||0);
  const todayNotes=notes.filter(n=>n._createdDate===today).length;
  const todayFeyn=fHist.filter(f=>f.date===today).length;
  const todayLog=logs.some(l=>l.date===today)?1:0;
  q.quests.forEach(qu=>{
    switch(qu.type){
      case 'pomo':qu.progress=Math.min(todayPomos,qu.target);break;
      case 'focusMin':qu.progress=Math.min(todayFocusM,qu.target);break;
      case 'taskDone':qu.progress=Math.min(todayTaskDone,qu.target);break;
      case 'note':qu.progress=Math.min(todayNotes,qu.target);break;
      case 'feynman':qu.progress=Math.min(todayFeyn,qu.target);break;
      case 'logSaved':qu.progress=Math.min(todayLog,qu.target);break;
      case 'combo':qu.progress=Math.min(gameState.comboCount,qu.target);break;
    }
  });
  save('dailyQuests',q);return q;
}
function renderDailyQuests(){
  const el=document.getElementById('dailyQuestsCard');if(!el)return;
  const q=computeQuestProgress();
  // 倒计时到午夜
  const now=new Date();const end=new Date(now);end.setHours(24,0,0,0);
  const msLeft=end-now;const hL=Math.floor(msLeft/3600000);const mL=Math.floor((msLeft%3600000)/60000);
  let html=`<div class="quest-card"><div class="quest-header">
    <h3>${t('quest.title')}</h3>
    <div class="quest-reset">${t('quest.reset',{h:hL,m:mL})}</div>
  </div>`;
  q.quests.forEach(qu=>{
    const done=qu.progress>=qu.target;
    const claimed=qu.claimed;
    const pct=Math.round(qu.progress/qu.target*100);
    const qName=qu.nameKey?t(qu.nameKey):(qu.name||'');
    html+=`<div class="quest-item ${claimed?'done':done?'claimable':''}">
      <div class="quest-icon">${qu.icon}</div>
      <div class="quest-info">
        <div class="quest-name">${qName}</div>
        <div style="font-size:11px;color:var(--text-dim)">${qu.progress} / ${qu.target}</div>
        <div class="quest-prog-bar"><div class="quest-prog-fill" style="width:${pct}%;background:${done?'var(--success)':'var(--accent)'}"></div></div>
      </div>
      ${claimed?'<div class="quest-reward" style="color:var(--success)">'+t('quest.claimed')+'</div>':
        done?`<button class="quest-claim-btn" onclick="claimQuest('${qu.id}')">${t('quest.claim',{n:qu.reward})}</button>`:
        `<div class="quest-reward">${t('quest.reward')}<div class="rv">🪙 ${qu.reward}</div></div>`}
    </div>`;
  });
  const allClaimed=q.quests.every(qu=>qu.claimed);
  if(allClaimed) html+=`<div style="text-align:center;padding:12px;color:var(--success);font-size:13px;font-weight:600">${t('quest.allDone')}</div>`;
  html+=`</div>`;
  el.innerHTML=html;
}
function claimQuest(id){
  const q=computeQuestProgress();
  const qu=q.quests.find(x=>x.id===id);
  if(!qu||qu.claimed||qu.progress<qu.target)return;
  qu.claimed=true;save('dailyQuests',q);
  const qName=qu.nameKey?t(qu.nameKey):(qu.name||'');
  addCoins(qu.reward,t('reward.questPre')+qName);
  renderDailyQuests();
  // 全部完成奖励：额外 50 币 + 护盾 1
  if(q.quests.every(x=>x.claimed)){
    fireConfetti();
    setTimeout(()=>{
      addCoins(50,t('reward.questAll'));
      addFreeze(1);
      showAchieve(t('quest.allDone.title'),50,t('quest.allDone.unit'),t('quest.allDone.sub'),'#f59e0b');
    },600);
  }
}

/* ═══ Streak ═══ */
// 带护盾保护的连续天数计算
// 关键设计：每天首次访问时才结算护盾消耗，避免重复扣除
function calcStreak(){
  const today=new Date();
  const allLogs=load('logs',[]);const allFocus=load('focusSessions',[]);
  let consumedFreezeDates=load('consumedFreezeDates',[]);
  const consumedSet=new Set(consumedFreezeDates);
  let lastSettled=load('lastStreakSettleDate','');
  const todayS=today.toLocaleDateString('zh-CN');

  // Build active-date set ONCE. Previous: 365 × (some() || some())
  // became O(365 × (logs.length + focus.length)). Now O(N+M+365).
  const activeSet=new Set();
  for(let i=0;i<allLogs.length;i++)activeSet.add(allLogs[i].date);
  for(let i=0;i<allFocus.length;i++)activeSet.add(allFocus[i].date);

  // 是否需要本次结算护盾（每天只结算一次）
  const shouldSettle=(lastSettled!==todayS);
  let newConsumedToday=[];

  let s=0;
  for(let d=0;d<365;d++){
    const dd=new Date(today);dd.setDate(dd.getDate()-d);
    const ds=dd.toLocaleDateString('zh-CN');
    if(activeSet.has(ds)){s++;continue}
    if(d===0){continue} // 今天不活跃不算断（今天还没过完）
    if(consumedSet.has(ds)){s++;continue} // 已用护盾的日子
    if(shouldSettle&&freezes>newConsumedToday.length){
      // 这一天可以用护盾保护
      newConsumedToday.push(ds);
      s++;continue;
    }
    break;
  }

  // 结算
  if(shouldSettle){
    if(newConsumedToday.length>0){
      consumedFreezeDates=[...consumedFreezeDates,...newConsumedToday];
      save('consumedFreezeDates',consumedFreezeDates);
      freezes-=newConsumedToday.length;save('freezes',freezes);
      setTimeout(()=>{
        if(typeof updateTopStatus==='function')updateTopStatus();
        showToast(t('toast.shield',{n:newConsumedToday.length}),'#38bdf8');
      },1000);
    }
    save('lastStreakSettleDate',todayS);
  }
  return s;
}
function updateStreak(){
  const s=calcStreak();const el=document.getElementById('streakBadge');
  if(s>=2){el.style.display='';el.textContent=t('streak.badge',{n:s})}else{el.style.display='none'}
}
updateStreak();

function exportData(){const data={};KEYS.forEach(k=>{const v=localStorage.getItem('phd_'+k);if(v!==null)data[k]=JSON.parse(v)});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='PhD-Study-Lab-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);showToast(t('toast.exported'));document.getElementById('dataDropdown').classList.remove('open')}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(!d||typeof d!=='object'||Array.isArray(d))throw new Error('root must be object');
      // Only accept known keys. Unknown keys (including malicious ones) silently dropped.
      const allowed=new Set(['dark','pomoSessions','focusSessions','feynmanHistory','notes','tasks','logs','coins','freezes','badges','gameState','dailyQuests','consumedFreezeDates','_lastKnownLevel','lastStreakSettleDate']);
      const MAXSTR=50000,MAXARR=10000,MAXKEYS=200;
      const sanitize=(v,depth)=>{
        if(depth>8)return null; // prevent stack bombs
        if(v==null)return v;
        if(typeof v==='string')return v.slice(0,MAXSTR);
        if(typeof v==='number'||typeof v==='boolean')return v;
        if(Array.isArray(v))return v.slice(0,MAXARR).map(x=>sanitize(x,depth+1));
        if(typeof v==='object'){const o={};Object.keys(v).slice(0,MAXKEYS).forEach(k=>{o[k]=sanitize(v[k],depth+1)});return o}
        return null;
      };
      let applied=0;
      Object.keys(d).forEach(k=>{
        if(!allowed.has(k))return;
        try{localStorage.setItem('phd_'+k,JSON.stringify(sanitize(d[k],0)));applied++}catch(_){}
      });
      if(!applied)throw new Error('no valid keys');
      showToast(t('toast.imported'));
      setTimeout(()=>location.reload(),800);
    }catch(err){showToast(t('toast.importFail'),'var(--danger)')}
  };
  r.readAsText(f);
  ev.target.value='';
  document.getElementById('dataDropdown').classList.remove('open');
}

/* ══════════════════════════════════
   POMODORO — real-time synced timer
   ══════════════════════════════════
   Core idea: record the wall-clock timestamp when the timer should
   end (pDeadline). Every tick computes remaining = deadline - now.
   This way the display stays correct even when the browser throttles
   setInterval in background tabs or after sleep/resume.
   ══════════════════════════════════ */
const PD={focus:25*60,short:5*60,long:15*60};
function PL(m){return t('pomo.mode.'+m)}
const CIR=2*Math.PI*120;
let pMode='focus',pRun=false,pInt=null;
let pDeadline=null;   // Date.now() + remaining ms when running
let pPausedLeft=PD.focus; // seconds left when paused
let focusSessions=load('focusSessions',[]);
let pSessionStart=null; // HH:MM string when this focus session began

function todayFocus(){return focusSessions.filter(s=>s.date===todayStr())}
function todayFocusMins(){return todayFocus().reduce((a,s)=>a+s.duration,0)}

function pRemaining(){
  if(pRun){const left=Math.round((pDeadline-Date.now())/1000);return Math.max(left,0)}
  return pPausedLeft;
}

function pR(){
  const rem=pRemaining();
  document.getElementById('pomoTime').textContent=String(Math.floor(rem/60)).padStart(2,'0')+':'+String(rem%60).padStart(2,'0');
  document.getElementById('pomoLabel').textContent=PL(pMode);
  document.getElementById('pomoArc').setAttribute('stroke-dashoffset',CIR*(1-(1-rem/PD[pMode])));
  const b=document.getElementById('pomoStartBtn');b.textContent=pRun?t('pomo.pause'):t('pomo.start');b.style.background=pRun?'var(--danger)':'var(--accent)';
  b.style.boxShadow=pRun?'0 4px 20px rgba(220,60,60,.3)':'0 4px 20px rgba(99,102,241,.3)';
  const tf=todayFocus();
  document.getElementById('pomoSessions').textContent=t('pomo.sessions',{n:tf.length});
  document.getElementById('pomoMins').textContent=t('pomo.mins',{n:todayFocusMins()});
  document.querySelectorAll('.pomo-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===pMode));
  let sl='';
  if(tf.length){sl='<div style="width:100%;max-width:360px"><div class="history-title" style="margin-top:8px">'+t('pomo.todayList')+'</div>';
    tf.forEach(s=>{sl+=`<div class="focus-item"><span>🎯 ${tE('pomo.session.start',{t:s.startTime})}</span><span style="color:var(--accent);font-weight:600">${t('pomo.session.dur',{n:s.duration|0})}</span></div>`});sl+='</div>'}
  document.getElementById('pomoTodayList').innerHTML=sl;
}

function pTick(){
  const rem=pRemaining();
  if(rem<=0&&pRun){
    // Timer finished
    clearInterval(pInt);pRun=false;pPausedLeft=0;
    if(pMode==='focus'){
      const dur=PD.focus/60;
      focusSessions.push({date:todayStr(),startTime:pSessionStart||timeStr(new Date()),duration:dur});
      save('focusSessions',focusSessions);
      const tf=todayFocus();const totalM=todayFocusMins();
      updateStreak();
      // === 游戏化奖励 ===
      // 1. 连击更新
      updateCombo(true);
      // 2. 金币奖励（基础 10 × 连击倍数，向下取整）
      const mult=comboMultiplier();
      const coinReward=Math.floor(10*mult);
      addCoins(coinReward,t('reward.pomo',{m:mult}));
      // 3. 可变比例宝箱掉落（约 35% 概率，保底机制见 rollLoot）
      const dropChance=0.35+(gameState.comboCount>=4?0.15:0); // 连击高时提升掉落
      const totalPomos=focusSessions.length;
      const shouldDropChest=Math.random()<dropChance||tf.length%5===0; // 第 5/10/15... 个必掉
      if(shouldDropChest){
        setTimeout(()=>showLootChest(rollLoot(totalPomos)),1800);
      }
      // 4. 更新任务进度
      renderDailyQuests();
      // 5. 原有的成就提示
      const msgIdx=Math.min(tf.length,9);
      const sub=t('pomo.msg.'+msgIdx)||'';
      const comboStr=mult>1?t('pomo.complete.combo',{m:mult}):'';
      showAchieve(t('pomo.complete'),totalM,t('pomo.complete.unit',{n:tf.length,c:coinReward,combo:comboStr}),sub,'var(--accent)');
      if(tf.length>=4)fireConfetti();
      renderMotivBanner();
    }
    pSessionStart=null;pDeadline=null;pR();
    try{new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQQAAAB/f39/").play()}catch(e){}
  } else {
    pR();
  }
}

function pomoToggle(){
  if(!pRun){
    // Start / Resume
    if(pPausedLeft<=0)pPausedLeft=PD[pMode]; // reset if was finished
    if(pMode==='focus'&&pPausedLeft===PD.focus)pSessionStart=timeStr(new Date());
    pDeadline=Date.now()+pPausedLeft*1000;
    pRun=true;
    // Use a short interval (250ms) so we catch up quickly after throttling
    pInt=setInterval(pTick,250);
  } else {
    // Pause — snapshot remaining time
    pPausedLeft=pRemaining();
    pRun=false;pDeadline=null;
    clearInterval(pInt);
  }
  pR();
}
function pomoReset(){clearInterval(pInt);pRun=false;pDeadline=null;pPausedLeft=PD[pMode];pSessionStart=null;pR()}
function pomoSwitchMode(m){clearInterval(pInt);pRun=false;pDeadline=null;pMode=m;pPausedLeft=PD[m];pSessionStart=null;pR()}
// Also sync on visibility change — when user comes back to the tab
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&pRun)pTick()});
pR();

}

const MOOD_EMOJIS=['😩','😔','😐','🙂','🔥'];
function MOODS_get(){return MOOD_EMOJIS.map((e,i)=>({emoji:e,label:t('mood.label.'+i)}))}
// tasks: current day's editable list
let tasks=load('tasks',[]);
let selMood=-1;
// logs: [{date,mood,tasks:[{text,done}],focusSessions:[{startTime,duration}],reflection}]
let logs=load('logs',[]);

function tR(){
  const MOODS=MOODS_get();
  const dn=tasks.filter(t=>t.done).length,pct=tasks.length?Math.round(dn/tasks.length*100):0;
  document.getElementById('trackPct').textContent=pct+'%';document.getElementById('trackBar').style.width=pct+'%';
  document.getElementById('trackBar').style.background=pct===100?'var(--success)':'var(--accent)';

    [...logs].reverse().forEach((l,ri)=>{const idx=logs.length-1-ri;const dn2=l.tasks?l.tasks.filter(t=>t.done).length:l.done||0;const tot=l.tasks?l.tasks.length:l.total||0;const fm=l.focusSessions?l.focusSessions.reduce((a,s)=>a+s.duration,0):0;
    lh+=`<div class="log-item" onclick="lView(${idx})"><span style="font-size:22px">${esc(l.mood)}</span><span style="font-size:13px;color:var(--text-dim);min-width:80px">${esc(l.date)}</span><span style="font-size:13px">${t('tracker.tasks',{d:dn2,t:tot})}</span><span style="font-size:12px;color:var(--accent);margin-left:4px">${fm?t('tracker.focus.min',{n:fm}):''}  </span>${l.reflection?'<span style="font-size:12px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">— '+esc(l.reflection)+'</span>':''}</div>`});lh+='</div>'}
  document.getElementById('logHistory').innerHTML=lh;

  const l=logs[i];
  const taskList=l.tasks||[];const doneT=taskList.filter(t=>t.done);const undoneT=taskList.filter(t=>!t.done);
  const fs=l.focusSessions||[];const totalFM=fs.reduce((a,s)=>a+s.duration,0);

  let taskHtml='';
  if(doneT.length){taskHtml+='<div style="margin-bottom:8px;font-size:12px;color:var(--success);font-weight:600">'+t('tracker.log.doneHead')+'</div>';doneT.forEach(tk=>{taskHtml+=`<div class="task-done-item"><div class="dot" style="background:var(--success)"></div><span>${esc(tk.text)}</span></div>`})}

      ${taskHtml}
    </div>
    <div class="modal-section"><div class="modal-section-title">${t('tracker.log.focus')}</div>${focusHtml}</div>
    ${l.reflection?'<div class="modal-section"><div class="modal-section-title">'+t('tracker.log.reflect')+'</div><div class="modal-section-content">'+esc(l.reflection)+'</div></div>':''}
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal();lEdit(${i})">${t('btn.edit')}</button><button class="btn btn-danger" onclick="closeModal();lDel(${i})">${t('btn.delete')}</button></div>`);
}

  const l=logs[i];let mh='';

  openModal(`<button class="modal-close" onclick="closeModal()">×</button><h2>${tE('tracker.log.edit',{date:l.date})}</h2>
    <div class="modal-section"><div class="modal-section-title">${t('tracker.log.mood')}</div><div style="display:flex;gap:10px;margin-top:8px" id="eMoodRow">${mh}</div></div>
    <div class="modal-section"><div class="modal-section-title">${t('tracker.log.reflection')}</div><textarea id="eLogRef" style="margin-top:6px;min-height:100px">${esc(l.reflection)}</textarea></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">${t('btn.cancel')}</button><button class="btn btn-accent" onclick="lSaveEdit(${i})">${t('btn.save')}</button></div>`);
}
function lSaveEdit(i){const ab=document.querySelector('#eMoodRow .mood-btn.active');if(ab)logs[i].mood=ab.dataset.emoji;logs[i].reflection=document.getElementById('eLogRef').value;save('logs',logs);closeModal();tR();showToast(t('toast.updated'))}
function lDel(i){openModal(`<button class="modal-close" onclick="closeModal()">×</button><h2>${t('confirm.del.title')}</h2><p style="color:var(--text-dim);margin-bottom:24px">${tE('tracker.log.del.msg',{date:logs[i].date})}</p><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">${t('btn.cancel')}</button><button class="btn btn-danger" onclick="lConfDel(${i})">${t('btn.confirm')}</button></div>`)}
function lConfDel(i){logs.splice(i,1);save('logs',logs);closeModal();tR();showToast(t('toast.deleted'))}

function toggleTask(i){
  const wasDone=tasks[i].done;
  tasks[i].done=!tasks[i].done;save('tasks',tasks);tR();
  // 完成时奖励金币
  if(!wasDone&&tasks[i].done){
    addCoins(3,t('reward.taskDone'));
    renderDailyQuests();
  }
  // Celebrate if all done
  const allDone=tasks.length>0&&tasks.every(tk=>tk.done);
  if(allDone){
    fireConfetti();
    addCoins(20,t('reward.taskAllDone'));
    showAchieve(t('achieve.allDone'),tasks.length,t('achieve.allDone.unit'),t('achieve.allDone.sub'),'var(--success)')
  }
}
function removeTask(i){tasks.splice(i,1);save('tasks',tasks);tR()}
function addTask(){const v=document.getElementById('newTaskInput').value.trim();if(!v)return;tasks.push({text:v,done:false});save('tasks',tasks);document.getElementById('newTaskInput').value='';tR()}
function selectMood(i){selMood=i;tR()}
function saveDay(){
  const MOODS=MOODS_get();
  const todayFS=todayFocus().map(s=>({startTime:s.startTime,duration:s.duration}));
  const totalFM=todayFS.reduce((a,s)=>a+s.duration,0);
  const doneCount=tasks.filter(tk=>tk.done).length;
  const totalCount=tasks.length;
  const pct=totalCount?Math.round(doneCount/totalCount*100):0;
  const moodEmoji=selMood>=0?MOODS[selMood].emoji:'—';

  logs.push({date:todayStr(),mood:moodEmoji,tasks:JSON.parse(JSON.stringify(tasks)),focusSessions:todayFS,reflection:document.getElementById('reflectionInput').value});
  save('logs',logs);
  selMood=-1;tasks=[];save('tasks',tasks);
  document.getElementById('reflectionInput').value='';
  tR();updateStreak();

  // Day summary
  let summaryLines=[];
  if(totalFM)summaryLines.push(t('tracker.summary.focus',{m:totalFM,n:todayFS.length}));
  if(totalCount)summaryLines.push(t('tracker.summary.tasks',{d:doneCount,t:totalCount}));
  const streak=calcStreak();if(streak>=2)summaryLines.push(t('tracker.summary.streak',{n:streak}));
  const summaryText=summaryLines.join('<br>');
  if(totalFM>=50||pct===100)fireConfetti();
  showAchieve(t('tracker.summary'),moodEmoji,'',summaryText,'var(--text)');
}
