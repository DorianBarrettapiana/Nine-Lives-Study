/* ══════════════════════════════════
   STATISTICS — rich analytics
   ══════════════════════════════════ */
let statRange=7;
function setRange(n){
  statRange=n;
  document.querySelectorAll('.stat-range').forEach(b=>b.classList.toggle('active',+b.dataset.range===n));
  document.querySelectorAll('.stat-range').forEach(b=>{if(+b.dataset.range===n){b.style.background='var(--accent)';b.style.color='#fff';b.style.borderColor='var(--accent)'}else{b.style.background='transparent';b.style.color='var(--text-dim)';b.style.borderColor='var(--border)'}});
  renderStats();
}

function getDays(n){
  const today=new Date(),arr=[];const count=n||Math.max(90,logs.length?Math.ceil((today-new Date(Math.min(...logs.map(l=>new Date(l.date).getTime()))))/86400000)+7:90);
  for(let d=count-1;d>=0;d--){const dd=new Date(today);dd.setDate(dd.getDate()-d);arr.push({date:dd.toLocaleDateString('zh-CN'),short:(dd.getMonth()+1)+'/'+dd.getDate(),dow:dd.getDay(),obj:dd})}return arr;
}

function renderStats(){
  const today=new Date();
  const days=getDays(statRange);
  const rangeLabel=statRange?t('stats.range.label',{n:statRange}):t('stats.range.label.all');

  // Index data by date
  // Build per-date indexes once (was: 3 separate forEach passes)
  const _idx=buildDataIndex(logs,focusSessions);
  const logByDay=_idx.logByDay,focusByDay=_idx.focusByDay,focusCountByDay=_idx.focusCountByDay;

  // ── KPI computation ──
  const rangeDates=days.map(d=>d.date);
  const rFocus=rangeDates.reduce((a,d)=>a+(focusByDay[d]||0),0);
  const rSessions=rangeDates.reduce((a,d)=>a+(focusCountByDay[d]||0),0);
  const rLogs=rangeDates.filter(d=>logByDay[d]).length;
  const rTaskPcts=rangeDates.map(d=>{const l=logByDay[d];if(!l||!l.tasks||!l.tasks.length)return null;return l.tasks.filter(t=>t.done).length/l.tasks.length*100}).filter(x=>x!==null);
  const rAvgTask=rTaskPcts.length?Math.round(rTaskPcts.reduce((a,b)=>a+b,0)/rTaskPcts.length):0;

  // Previous period for comparison
  const prevDays=[];if(statRange){for(let d=statRange*2-1;d>=statRange;d--){const dd=new Date(today);dd.setDate(dd.getDate()-d);prevDays.push(dd.toLocaleDateString('zh-CN'))}}
  const prevFocus=prevDays.reduce((a,d)=>a+(focusByDay[d]||0),0);
  const prevTaskPcts=prevDays.map(d=>{const l=logByDay[d];if(!l||!l.tasks||!l.tasks.length)return null;return l.tasks.filter(t=>t.done).length/l.tasks.length*100}).filter(x=>x!==null);
  const prevAvgTask=prevTaskPcts.length?Math.round(prevTaskPcts.reduce((a,b)=>a+b,0)/prevTaskPcts.length):0;
  const prevLogs=prevDays.filter(d=>logByDay[d]).length;

  // Streak
  let streak=0;for(let d=0;d<365;d++){const dd=new Date(today);dd.setDate(dd.getDate()-d);const ds=dd.toLocaleDateString('zh-CN');if(logByDay[ds]||focusByDay[ds])streak++;else break}

  // Sparklines (last N days focus)
  const sparkVals=days.slice(-Math.min(days.length,14)).map(d=>focusByDay[d.date]||0);
  const sparkMax=Math.max(...sparkVals,1);
  const sparkHtml=sparkVals.map(v=>`<div class="spark-bar" style="height:${Math.max(2,v/sparkMax*28)}px;background:var(--accent)"></div>`).join('');

  function delta(cur,prev,unit=''){if(!statRange)return '';const diff=cur-prev;if(diff>0)return `<div class="delta delta-up">↑ ${diff}${unit}</div>`;if(diff<0)return `<div class="delta delta-down">↓ ${Math.abs(diff)}${unit}</div>`;return `<div class="delta delta-flat">${t('stats.delta.flat')}</div>`}

  document.getElementById('statCards').innerHTML=`
    <div class="stat-card"><div class="stat-number" style="color:var(--accent)">${rFocus}</div><div class="stat-label">${t('stats.kpi.focusMin')}</div>${delta(rFocus,prevFocus,t('stats.unit.min'))}<div class="sparkline">${sparkHtml}</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--success)">${rSessions}</div><div class="stat-label">${t('stats.kpi.sessions')}</div>${delta(rSessions,prevDays.reduce((a,d)=>a+(focusCountByDay[d]||0),0),t('stats.unit.times'))}</div>
    <div class="stat-card"><div class="stat-number" style="color:#8b5cf6">${rAvgTask}%</div><div class="stat-label">${t('stats.kpi.avgTask')}</div>${delta(rAvgTask,prevAvgTask,t('stats.unit.percent'))}</div>
    <div class="stat-card"><div class="stat-number" style="color:var(--warning)">${streak}</div><div class="stat-label">${t('stats.kpi.streak')}</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#ec4899">${rLogs}</div><div class="stat-label">${t('stats.kpi.logDays')}</div>${delta(rLogs,prevLogs,t('stats.unit.day'))}</div>
    <div class="stat-card"><div class="stat-number" style="color:#14b8a6">${notes.length+fHist.length}</div><div class="stat-label">${t('stats.kpi.notesFeyn')}</div></div>`;

  // ── Level / XP system ──
  // XP = total focus minutes + completed tasks×5 + logs×10 + notes×15 + feynman×20
  const allFocusTotal=focusSessions.reduce((a,s)=>a+s.duration,0);
  const allTasksDone=logs.reduce((a,l)=>{const ts=l.tasks||[];return a+ts.filter(t=>t.done).length},0);
  const xp=allFocusTotal+allTasksDone*5+logs.length*10+notes.length*15+fHist.length*20;
  // Levels (name resolved via i18n)
  const levelMins=[0,50,150,350,700,1200,2000,3500,5500,8000];
  const levels=levelMins.map((mn,i)=>({name:t('level.'+(i+1)),min:mn}));
  let curLevel=0;for(let i=levels.length-1;i>=0;i--){if(xp>=levels[i].min){curLevel=i;break}}
  const nextLevel=curLevel<levels.length-1?levels[curLevel+1]:null;
  const lvProgress=nextLevel?Math.min(100,Math.round((xp-levels[curLevel].min)/(nextLevel.min-levels[curLevel].min)*100)):100;
  document.getElementById('levelCard').innerHTML=`
    <div class="level-title" style="color:var(--text-dim)">${t('stats.level.current')}</div>
    <div class="level-num" style="background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Lv.${curLevel+1}</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">${levels[curLevel].name}</div>
    <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${lvProgress}%"></div></div>
    <div style="font-size:12px;color:var(--text-dim)">${nextLevel?t('stats.level.next',{xp:xp,min:nextLevel.min,name:nextLevel.name}):t('stats.level.max',{xp:xp})}</div>
    <div style="margin-top:10px;font-size:11px;color:var(--text-dim)">${t('stats.level.legend')}</div>`;
  // 检查是否升级
  checkLevelUp(curLevel,levels[curLevel].name);

  // ── Milestones ──
  const milestones=[
    {k:'1',check:allFocusTotal>=25,progress:Math.min(allFocusTotal,25),target:25,unit:t('stats.unit.min')},
    {k:'2',check:allFocusTotal>=60,progress:Math.min(allFocusTotal,60),target:60,unit:t('stats.unit.min')},
    {k:'3',check:allFocusTotal>=240,progress:Math.min(allFocusTotal,240),target:240,unit:t('stats.unit.min')},
    {k:'4',check:allFocusTotal>=600,progress:Math.min(allFocusTotal,600),target:600,unit:t('stats.unit.min')},
    {k:'5',check:allFocusTotal>=6000,progress:Math.min(allFocusTotal,6000),target:6000,unit:t('stats.unit.min')},
    {k:'6',check:logs.length>=7,progress:Math.min(logs.length,7),target:7,unit:t('stats.unit.day')},
    {k:'7',check:logs.length>=30,progress:Math.min(logs.length,30),target:30,unit:t('stats.unit.day')},
    {k:'8',check:streak>=7,progress:Math.min(streak,7),target:7,unit:t('stats.unit.day')},
    {k:'9',check:streak>=30,progress:Math.min(streak,30),target:30,unit:t('stats.unit.day')},
    {k:'10',check:notes.length>=10,progress:Math.min(notes.length,10),target:10,unit:t('stats.unit.pc')},
    {k:'11',check:fHist.length>=10,progress:Math.min(fHist.length,10),target:10,unit:t('stats.unit.times')},
  ].map(m=>({...m,name:t('stats.ms.'+m.k+'.n'),desc:t('stats.ms.'+m.k+'.d')}));
  // Show: next 3 uncompleted + all completed
  const done=milestones.filter(m=>m.check);
  const pending=milestones.filter(m=>!m.check).slice(0,3);
  const showMs=[...pending,...done];
  let msHtml='<h3 style="font-size:15px;margin-bottom:14px">'+t('stats.ms.title')+'　<span style="font-size:12px;color:var(--text-dim);font-weight:400">'+done.length+' / '+milestones.length+'</span></h3>';
  showMs.forEach(m=>{
    const pct=Math.round(m.progress/m.target*100);
    msHtml+=`<div class="milestone-row"><div class="ms-check ${m.check?'done':'pending'}">${m.check?'✓':''}</div><div class="ms-info"><div class="ms-name" style="${m.check?'':'color:var(--text)'}">${m.name}</div><div class="ms-desc">${m.desc}</div>${!m.check?'<div style="margin-top:4px"><div class="mini-bar-bg" style="height:5px"><div class="mini-bar-fill" style="width:'+pct+'%;background:var(--accent)"></div></div></div>':''}</div><div class="ms-progress" style="color:${m.check?'var(--success)':'var(--text-dim)'}">${m.check?t('stats.ms.achieved'):m.progress+'/'+m.target}</div></div>`;
  });
  document.getElementById('milestonesCard').innerHTML=msHtml;

  // ── Personal Records ──
  // Best single day focus, longest streak, most tasks in a day, most pomodoros in a day
  let recBestFocus=0,recBestFocusDay='—';
  let recBestTasks=0,recBestTasksDay='—';
  let recBestPomos=0,recBestPomosDay='—';
  Object.keys(focusByDay).forEach(d=>{if(focusByDay[d]>recBestFocus){recBestFocus=focusByDay[d];recBestFocusDay=d}});
  Object.keys(focusCountByDay).forEach(d=>{if(focusCountByDay[d]>recBestPomos){recBestPomos=focusCountByDay[d];recBestPomosDay=d}});
  logs.forEach(l=>{const dn=l.tasks?l.tasks.filter(t=>t.done).length:0;if(dn>recBestTasks){recBestTasks=dn;recBestTasksDay=l.date}});
  // Longest ever streak
  let longestStreak=0,tempStreak=0;
  const allDates=[];for(let d=365;d>=0;d--){const dd=new Date(today);dd.setDate(dd.getDate()-d);allDates.push(dd.toLocaleDateString('zh-CN'))}
  allDates.forEach(d=>{if(focusByDay[d]||logByDay[d]){tempStreak++;if(tempStreak>longestStreak)longestStreak=tempStreak}else tempStreak=0});

  const U={min:t('stats.unit.min'),day:t('stats.unit.day'),pc:t('stats.unit.pc'),n:t('stats.unit.times')};
  const sp=(v,u)=>u?v+' '+u:v;
  document.getElementById('recordsCard').innerHTML=`
    <h3 style="font-size:15px;margin-bottom:14px">${t('stats.records.title')}</h3>
    <div class="record-row"><span style="color:var(--text-dim)">${t('stats.records.bestFocus')}</span><span class="record-val">${sp(recBestFocus,U.min)}</span></div>
    <div class="record-row"><span style="color:var(--text-dim)">${t('stats.records.bestPomos')}</span><span class="record-val">${sp(recBestPomos,U.n)}</span></div>
    <div class="record-row"><span style="color:var(--text-dim)">${t('stats.records.bestTasks')}</span><span class="record-val">${sp(recBestTasks,U.pc)}</span></div>
    <div class="record-row"><span style="color:var(--text-dim)">${t('stats.records.longestStreak')}</span><span class="record-val">${sp(longestStreak,U.day)}</span></div>
    <div class="record-row"><span style="color:var(--text-dim)">${t('stats.records.totalFocus')}</span><span class="record-val">${sp(allFocusTotal,U.min)}</span></div>
    <div class="record-row"><span style="color:var(--text-dim)">${t('stats.records.totalTasks')}</span><span class="record-val">${sp(allTasksDone,U.pc)}</span></div>`;

  // ── Insights ──
  const insights=[];
  // Best day
  let bestDay=null,bestFocus=0;rangeDates.forEach(d=>{if((focusByDay[d]||0)>bestFocus){bestFocus=focusByDay[d];bestDay=d}});
  if(bestDay)insights.push({k:t('stats.insights.bestDay'),v:`${bestDay}　${bestFocus} ${U.min}`});
  // Average daily
  const activeDays=rangeDates.filter(d=>focusByDay[d]||logByDay[d]).length;
  if(activeDays){
    insights.push({k:t('stats.insights.avgDay'),v:`${Math.round(rFocus/activeDays)} ${U.min}`});
    insights.push({k:t('stats.insights.activeRate'),v:t('stats.insights.activeFmt',{a:activeDays,t:days.length,p:Math.round(activeDays/days.length*100)})});
  }
  // Peak hour
  const hourBuckets=Array(24).fill(0);
  const hourSessions=Array(24).fill(0);
  const rangeDateSet=new Set(rangeDates);
  focusSessions.forEach(s=>{if(!rangeDateSet.has(s.date))return;const hMatch=s.startTime?s.startTime.match(/^(\d+)/):null;if(hMatch){const h=parseInt(hMatch[1]);hourBuckets[h]+=s.duration;hourSessions[h]++}});
  const peakHour=hourBuckets.indexOf(Math.max(...hourBuckets));
  if(hourBuckets[peakHour]>0)insights.push({k:t('stats.insights.peakHour'),v:`${peakHour}:00 – ${peakHour+1}:00`});
  // Mood correlation
  const moodMap={'😩':1,'😔':2,'😐':3,'🙂':4,'🔥':5};
  const highMoodDays=[],lowMoodDays=[];
  rangeDates.forEach(d=>{const l=logByDay[d];if(!l)return;const mv=moodMap[l.mood]||0;if(mv>=4)highMoodDays.push(d);if(mv<=2)lowMoodDays.push(d)});
  const highMoodFocus=highMoodDays.length?Math.round(highMoodDays.reduce((a,d)=>a+(focusByDay[d]||0),0)/highMoodDays.length):0;
  const lowMoodFocus=lowMoodDays.length?Math.round(lowMoodDays.reduce((a,d)=>a+(focusByDay[d]||0),0)/lowMoodDays.length):0;
  if(highMoodDays.length&&lowMoodDays.length){
    insights.push({k:t('stats.insights.goodMood'),v:`${highMoodFocus} ${U.min}`});
    insights.push({k:t('stats.insights.badMood'),v:`${lowMoodFocus} ${U.min}`});
  }

  if(!insights.length)insights.push({k:t('stats.insights.hint'),v:t('stats.insights.empty')});
  document.getElementById('insightsCard').innerHTML='<h3 style="font-size:15px;margin-bottom:8px">'+t('stats.insights.title')+'</h3>'+insights.map(i=>`<div class="insight-row"><span class="insight-key">${i.k}</span><span class="insight-val">${i.v}</span></div>`).join('');

  // ── Focus hour distribution ──
  const maxHour=Math.max(...hourBuckets,1);
  let hcHtml='';
  // Show 6am–1am range (relevant hours)
  for(let h=6;h<=24;h++){
    const hr=h%24;const val=hourBuckets[hr];const barH=Math.max(2,val/maxHour*80);
    const isPeak=hr===peakHour&&val>0;
    hcHtml+=`<div class="hour-bar-wrap"><div class="hour-val">${val||''}</div><div class="hour-bar" style="height:${barH}px;background:${isPeak?'var(--accent)':val?'var(--accent)50':'var(--border)'}"></div><div class="hour-label">${t('stats.hour.label',{h:hr})}</div></div>`;
  }
  document.getElementById('hourChart').innerHTML=hcHtml;

  // ── Weekly comparison ──
  // Group by calendar week
  const weeks={};
  const allDays=getDays(statRange||90);
  allDays.forEach(d=>{
    const wStart=new Date(d.obj);wStart.setDate(wStart.getDate()-wStart.getDay());
    const wKey=wStart.toLocaleDateString('zh-CN');
    if(!weeks[wKey])weeks[wKey]={label:wKey,focus:0,tasks:0,tasksDone:0,days:0};
    weeks[wKey].focus+=focusByDay[d.date]||0;
    const l=logByDay[d.date];if(l&&l.tasks){weeks[wKey].tasks+=l.tasks.length;weeks[wKey].tasksDone+=l.tasks.filter(t=>t.done).length}
    if(focusByDay[d.date]||logByDay[d.date])weeks[wKey].days++;
  });
  const weekArr=Object.values(weeks).slice(-6);// last 6 weeks
  const maxWF=Math.max(...weekArr.map(w=>w.focus),1);
  let wtHtml=`<div class="weekly-row" style="font-weight:700;color:var(--text-dim);font-size:11px;border-bottom:2px solid var(--border)"><span>${t('stats.weekly.start')}</span><span>${t('stats.weekly.focus')}</span><span>${t('stats.weekly.rate')}</span></div>`;
  weekArr.forEach(w=>{
    const pct=w.tasks?Math.round(w.tasksDone/w.tasks*100):0;
    wtHtml+=`<div class="weekly-row"><span style="color:var(--text-dim)">${w.label.slice(5)}</span><div><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${Math.round(w.focus/maxWF*100)}%;background:var(--accent)"></div></div><span style="font-size:11px;color:var(--text-dim)">${t('stats.weekly.info',{m:w.focus,d:w.days})}</span></div><span style="font-weight:700;color:${pct>=70?'var(--success)':pct>=40?'var(--warning)':'var(--text-dim)'}">${w.tasks?pct+'%':'—'}</span></div>`;
  });
  document.getElementById('weeklyTable').innerHTML=wtHtml;

  // ── Mood statistics ──
  const moodEmojis=['😩','😔','😐','🙂','🔥'];
  const moodColors2={'😩':'#ef4444','😔':'#f97316','😐':'#eab308','🙂':'#22c55e','🔥':'#6366f1'};

  // Count mood occurrences in range
  const moodCounts={};moodEmojis.forEach(e=>{moodCounts[e]=0});
  const rangeLogs=rangeDates.map(d=>logByDay[d]).filter(Boolean);
  rangeLogs.forEach(l=>{if(moodCounts.hasOwnProperty(l.mood))moodCounts[l.mood]++});
  const maxMoodCount=Math.max(...Object.values(moodCounts),1);
  const totalMoodLogs=rangeLogs.filter(l=>moodEmojis.includes(l.mood)).length;

  // Distribution bars
  let mdHtml='';
  moodEmojis.forEach((e,i)=>{
    const cnt=moodCounts[e];const pct=totalMoodLogs?Math.round(cnt/totalMoodLogs*100):0;
    mdHtml+=`<div class="mood-dist-row"><div class="mood-dist-emoji">${e}</div><div style="flex:1"><div class="mood-dist-bar"><div class="mood-dist-fill" style="width:${maxMoodCount?cnt/maxMoodCount*100:0}%;background:${moodColors2[e]}"></div></div></div><div class="mood-dist-info">${t('stats.mood.dist',{n:cnt,p:pct})}</div></div>`;
  });
  // Average mood score
  const moodScores=rangeLogs.map(l=>moodMap[l.mood]).filter(Boolean);
  const avgMood=moodScores.length?(moodScores.reduce((a,b)=>a+b,0)/moodScores.length).toFixed(1):0;
  const avgMoodEmoji=avgMood>=4.5?'🔥':avgMood>=3.5?'🙂':avgMood>=2.5?'😐':avgMood>=1.5?'😔':'😩';
  if(moodScores.length)mdHtml+=`<div style="text-align:center;margin-top:12px;padding:10px;background:var(--bg);border-radius:10px;font-size:14px">${t('stats.mood.avg')} <span style="font-size:20px;margin:0 4px">${avgMoodEmoji}</span> <b>${avgMood}</b> / 5</div>`;
  document.getElementById('moodDistribution').innerHTML=mdHtml;

  // Timeline (dots for each day)
  let mtHtml='';
  days.forEach(d=>{
    const l=logByDay[d.date];
    const emoji=l&&moodEmojis.includes(l.mood)?l.mood:'';
    const bg=emoji?moodColors2[emoji]+'30':'var(--border)';
    const border=emoji?moodColors2[emoji]:'transparent';
    mtHtml+=`<div class="mood-dot" style="background:${bg};border:1.5px solid ${border}" title="${d.date}${emoji?' '+emoji:' '+t('stats.mood.no.record')}">${emoji||'·'}</div>`;
  });
  document.getElementById('moodTimeline').innerHTML=mtHtml;

  // Mood × Focus correlation table
  let mcHtml=`<div style="font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">${t('stats.mood.corr')}</div>`;
  const moodFocusData={};moodEmojis.forEach(e=>{moodFocusData[e]={totalFocus:0,count:0,totalTaskPct:0}});
  rangeLogs.forEach(l=>{
    if(!moodFocusData[l.mood])return;
    moodFocusData[l.mood].totalFocus+=(focusByDay[l.date]||0);
    moodFocusData[l.mood].count++;
    if(l.tasks&&l.tasks.length)moodFocusData[l.mood].totalTaskPct+=l.tasks.filter(t=>t.done).length/l.tasks.length*100;
  });
  const hasCorrelationData=moodEmojis.some(e=>moodFocusData[e].count>0);
  if(hasCorrelationData){
    const maxAvgFocus=Math.max(...moodEmojis.map(e=>moodFocusData[e].count?moodFocusData[e].totalFocus/moodFocusData[e].count:0),1);
    moodEmojis.forEach((e,i)=>{
      const d=moodFocusData[e];if(!d.count)return;
      const avgF=Math.round(d.totalFocus/d.count);
      const avgT=Math.round(d.totalTaskPct/d.count);
      mcHtml+=`<div class="mood-corr-row"><div class="mood-corr-emoji">${e}</div><div class="mood-corr-data"><div style="display:flex;align-items:center;gap:8px"><span class="mood-corr-label">${t('stats.mood.corr.focus')}</span><div class="mini-bar-bg" style="flex:1;height:6px"><div class="mini-bar-fill" style="width:${Math.round(avgF/maxAvgFocus*100)}%;background:${moodColors2[e]}"></div></div><span style="font-size:12px;font-weight:700">${avgF}${U.min}</span></div><div style="display:flex;align-items:center;gap:8px"><span class="mood-corr-label">${t('stats.mood.corr.done')}</span><div class="mini-bar-bg" style="flex:1;height:6px"><div class="mini-bar-fill" style="width:${avgT}%;background:${moodColors2[e]}80"></div></div><span style="font-size:12px;font-weight:700">${avgT}%</span></div></div><div style="font-size:11px;color:var(--text-dim);text-align:center;min-width:36px">${t('stats.mood.corr.days',{n:d.count})}</div></div>`;
    });
  } else {
    mcHtml+=`<div style="color:var(--text-dim);font-size:13px;padding:8px 0">${t('stats.mood.corr.empty')}</div>`;
  }
  document.getElementById('moodCorrelation').innerHTML=mcHtml;

  // ── Heatmap (90 days) ──
  const hmDays=getDays(statRange||90);
  let hmHtml='';
  hmDays.forEach(d=>{
    const fm=focusByDay[d.date]||0;
    const hasLog=!!logByDay[d.date];
    const activity=fm/25+(hasLog?1:0);
    let color='var(--border)';
    if(activity>0)color='#6366f130';if(activity>=2)color='#6366f160';if(activity>=4)color='#6366f1a0';if(activity>=6)color='#6366f1';
    hmHtml+=`<div class="heat-cell" style="background:${color}" title="${t('stats.heat.tip',{d:d.date,m:fm,log:hasLog?t('stats.heat.hasLog'):''})}" onclick="heatDetail('${d.date}')"></div>`;
  });
  document.getElementById('heatmap').innerHTML=hmHtml;
  // 渲染徽章收藏
  renderBadgeCollection();
}

function heatDetail(dateStr){
  const l=logs.find(x=>x.date===dateStr);
  const fs=focusSessions.filter(s=>s.date===dateStr);
  const totalM=fs.reduce((a,s)=>a+s.duration,0);
  let body='';
  if(fs.length){body+='<div class="modal-section"><div class="modal-section-title">'+t('stats.heat.focus')+'</div>';fs.forEach(s=>{body+=`<div class="focus-item"><span>🎯 ${s.startTime}</span><span style="color:var(--accent);font-weight:600">${s.duration}${t('stats.unit.min')}</span></div>`});body+=`<div style="text-align:right;margin-top:6px;font-size:13px;color:var(--accent);font-weight:700">${t('stats.heat.total',{m:totalM})}</div></div>`}
  if(l){
    const ts=l.tasks||[];const dn=ts.filter(t=>t.done);const und=ts.filter(t=>!t.done);
    if(ts.length){body+='<div class="modal-section"><div class="modal-section-title">'+t('stats.heat.tasks')+'</div>';dn.forEach(tk=>{body+=`<div class="task-done-item"><div class="dot" style="background:var(--success)"></div><span>${esc(tk.text)}</span></div>`});und.forEach(tk=>{body+=`<div class="task-done-item"><div class="dot" style="background:var(--border)"></div><span style="color:var(--text-dim)">${esc(tk.text)}</span></div>`});body+='</div>'}
    if(l.reflection)body+=`<div class="modal-section"><div class="modal-section-title">${t('stats.heat.reflect')}</div><div class="modal-section-content">${esc(l.reflection)}</div></div>`;
    body+=`<div style="font-size:14px;margin-top:8px">${t('stats.heat.mood',{m:l.mood})}</div>`;
  }
  if(!body)body='<p style="color:var(--text-dim)">'+t('stats.heat.empty')+'</p>';
  openModal(`<button class="modal-close" onclick="closeModal()">×</button><h2>📅 ${dateStr}</h2>${body}`);
}

/* ═══════════════════════════════════════════════
   🚀 Initialization — wire up all gamification
   ═══════════════════════════════════════════════ */
// 每分钟刷新一次任务倒计时
function initGamification(){
  applyI18n(); // 首次应用语言到所有 data-i18n 元素
  updateTopStatus();
  renderMotivBanner();
  renderDailyQuests();
  renderCombo();
  // 延迟显示签到奖励（避免和其他弹窗冲突）
  setTimeout(()=>tryDailyLogin(),600);
  // 单一的每分钟 tick：合并了原来的两个 setInterval(..., 60000)，
  // 并且在页面隐藏时暂停，省 CPU 也避免浪费的 DOM 重建。
  let _gameTick=null;
  function startGameTick(){
    if(_gameTick)return;
    _gameTick=setInterval(()=>{
      if(document.hidden)return;
      const today=todayStr();
      if(document.getElementById('sec-pomodoro').classList.contains('active')){
        renderDailyQuests();
        renderMotivBanner();
      }
      if(gameState.lastActiveDate&&gameState.lastActiveDate!==today){
        // 跨天：刷新鼓励语和任务
        renderMotivBanner();
        renderDailyQuests();
      }
      gameState.lastActiveDate=today;saveGameState();
    },60000);
  }
  function stopGameTick(){if(_gameTick){clearInterval(_gameTick);_gameTick=null}}
  document.addEventListener('visibilitychange',()=>{document.hidden?stopGameTick():startGameTick()});
  startGameTick();
}
initGamification();

// 导出时包含游戏化数据
const _origExport=exportData;
window.exportData=function(){
  // 临时把游戏化 key 加入 KEYS
  const extraKeys=['coins','freezes','badges','gameState','dailyQuests','consumedFreezeDates','_lastKnownLevel'];
  extraKeys.forEach(k=>{if(!KEYS.includes(k))KEYS.push(k)});
  _origExport();
};
