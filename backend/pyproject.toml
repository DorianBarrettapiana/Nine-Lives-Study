[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers -q"
pythonpath = ["."]

[tool.ruff]
line-length = 110
target-version = "py310"
extend-exclude = ["__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",  # long lines (we keep some long SQL/dicts)
    "B008",  # function calls in defaults (FastAPI Depends pattern)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # assert False is fine in tests
